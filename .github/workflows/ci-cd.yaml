name: Sentinel OS CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options: [dev, staging, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sentinel-os
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - ingestion-service
          - ai-service
          - osint-service
          - fusion-service
          - cyber-service
          - response-service
          - simulation-service
          - governance-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --workspace=services/${{ matrix.service }}
      - run: npm run lint --workspace=services/${{ matrix.service }}
      - run: npx tsc --noEmit --project services/${{ matrix.service }}/tsconfig.json

  test:
    name: Unit & Integration Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - ingestion-service
          - ai-service
          - osint-service
          - fusion-service
          - cyber-service
          - response-service
          - simulation-service
          - governance-service
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: sentinel_test
          POSTGRES_USER: sentinel_test
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          CLUSTER_ID: 'sentinel-test-cluster-id-01'
        ports: ['9092:9092']
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DATABASE: sentinel_test
      PG_USER: sentinel_test
      PG_PASSWORD: test_password
      REDIS_URL: redis://localhost:6379
      KAFKA_BROKERS: localhost:9092
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --workspace=services/${{ matrix.service }}
      - run: npm test --workspace=services/${{ matrix.service }}
        env:
          CI: true

  security-scan:
    name: Security Scanning
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: 'CRITICAL,HIGH'
          exit-code: 1
      - name: SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/nodejs
            p/typescript

  build-and-push:
    name: Build & Push Images
    needs: [test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - ingestion-service
          - ai-service
          - osint-service
          - fusion-service
          - cyber-service
          - response-service
          - simulation-service
          - governance-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  build-ui:
    name: Build UI
    needs: [test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sentinel-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    needs: [build-and-push, build-ui]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: aws eks update-kubeconfig --name sentinel-dev --region ${{ vars.AWS_REGION }}
      - name: Deploy with Kustomize
        run: |
          cd infrastructure/kubernetes
          kustomize edit set image "sentinel-os/*=ghcr.io/${{ env.IMAGE_PREFIX }}/*:${{ github.sha }}"
          kubectl apply -k overlays/dev/
      - name: Wait for rollout
        run: |
          for svc in api-gateway auth-service ingestion-service ai-service osint-service fusion-service cyber-service response-service; do
            kubectl rollout status deployment/$svc -n sentinel-os --timeout=300s
          done
      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=curlimages/curl --restart=Never --rm -it --timeout=60s -- \
            curl -sf http://api-gateway.sentinel-os.svc:4000/health/ready

  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, build-ui]
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: aws eks update-kubeconfig --name sentinel-staging --region ${{ vars.AWS_REGION }}
      - name: Deploy with Kustomize
        run: |
          cd infrastructure/kubernetes
          kustomize edit set image "sentinel-os/*=ghcr.io/${{ env.IMAGE_PREFIX }}/*:${{ github.sha }}"
          kubectl apply -k overlays/staging/
      - name: Wait for rollout
        run: |
          for svc in api-gateway auth-service ingestion-service ai-service osint-service fusion-service cyber-service response-service; do
            kubectl rollout status deployment/$svc -n sentinel-os --timeout=300s
          done

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: aws eks update-kubeconfig --name sentinel-prod --region ${{ vars.AWS_REGION }}
      - name: Canary deployment
        run: |
          cd infrastructure/kubernetes
          kustomize edit set image "sentinel-os/*=ghcr.io/${{ env.IMAGE_PREFIX }}/*:${{ github.sha }}"
          kubectl apply -k overlays/prod/
      - name: Wait for rollout
        run: |
          for svc in api-gateway auth-service ingestion-service ai-service osint-service fusion-service cyber-service response-service; do
            kubectl rollout status deployment/$svc -n sentinel-os --timeout=600s
          done
      - name: Post-deploy health check
        run: |
          kubectl run health-check --image=curlimages/curl --restart=Never --rm -it --timeout=120s -- \
            curl -sf http://api-gateway.sentinel-os.svc:4000/health/ready

  database-migrations:
    name: Run Database Migrations
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run PostgreSQL migrations
        run: npm run migrate:pg
        env:
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: ${{ secrets.PG_PORT }}
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      - name: Run Neo4j migrations
        run: npm run migrate:neo4j
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
