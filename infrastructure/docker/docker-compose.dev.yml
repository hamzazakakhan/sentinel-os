version: '3.8'

services:
  # ── Databases ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../databases/postgresql/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Streaming ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ── Backend Services ──────────────────────────────────────
  api-gateway:
    build:
      context: ../../services/api-gateway/python
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      SENTINEL_PG_HOST: postgres
      SENTINEL_PG_PORT: 5432
      SENTINEL_PG_USER: sentinel
      SENTINEL_PG_PASSWORD: sentinel_secret
      SENTINEL_PG_DATABASE: sentinel_db
      SENTINEL_MONGO_URI: mongodb://mongodb:27017
      SENTINEL_MONGO_DATABASE: sentinel_raw
      SENTINEL_NEO4J_URI: bolt://neo4j:7687
      SENTINEL_NEO4J_USER: neo4j
      SENTINEL_NEO4J_PASSWORD: neo4j_secret
      SENTINEL_REDIS_URL: redis://redis:6379/0
      SENTINEL_KAFKA_BROKERS: kafka:29092
      SENTINEL_CORS_ORIGINS: '["http://localhost:3000"]'
      SENTINEL_ENVIRONMENT: development
      SENTINEL_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ingestion-service:
    build:
      context: ../../services/ingestion-service/go
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      INGESTION_PORT: 5000
      KAFKA_BROKERS: kafka:29092
      MQTT_BROKER: tcp://mosquitto:1883
    depends_on:
      - kafka
    restart: unless-stopped

  ai-service:
    build:
      context: ../../services/ai-service/python
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      AI_OLLAMA_HOST: http://ollama:11434
      AI_KAFKA_BROKERS: kafka:29092
      AI_REDIS_URL: redis://redis:6379/1
      AI_API_GATEWAY_URL: http://api-gateway:4000
      AI_DEVICE: cpu
    depends_on:
      - kafka
      - api-gateway
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  # ── Frontend ──────────────────────────────────────────────
  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  # ── Observability ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ../../infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sentinel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  mongodata:
  neo4jdata:
  kafkadata:
  promdata:
  grafanadata:
  ollamadata:
