# ══════════════════════════════════════════════════════════════

input GeoPointInput {
  latitude: Float!
  longitude: Float!
  altitude: Float
}

input GeoAreaInput {
  type: String!
  coordinates: [[Float!]!]!
}

input TimeRangeInput {
  start: DateTime!
  end: DateTime!
}

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

input AlertFilterInput {
  severities: [ThreatSeverity!]
  statuses: [AlertStatus!]
  domains: [DomainType!]
  classifications: [ClassificationLevel!]
  timeRange: TimeRangeInput
  geoWithin: GeoAreaInput
  tags: [String!]
  assignedTo: UUID
  searchText: String
  minConfidence: Float
  sortBy: String
  sortDirection: SortDirection
}

input DetectionFilterInput {
  sensorIds: [UUID!]
  domains: [DomainType!]
  detectionTypes: [String!]
  minConfidence: Float
  timeRange: TimeRangeInput
  geoWithin: GeoAreaInput
  sortBy: String
  sortDirection: SortDirection
}

input TrackFilterInput {
  domains: [DomainType!]
  entityTypes: [String!]
  isActive: Boolean
  minConfidence: Float
  threatAssessments: [ThreatSeverity!]
  geoWithin: GeoAreaInput
  sortBy: String
  sortDirection: SortDirection
}

input CyberEventFilterInput {
  eventTypes: [String!]
  severities: [ThreatSeverity!]
  sourceIps: [String!]
  destinationIps: [String!]
  signatureIds: [String!]
  mitreTechniques: [String!]
  timeRange: TimeRangeInput
  sortBy: String
  sortDirection: SortDirection
}

input OsintFilterInput {
  sourceTypes: [OsintSourceType!]
  sentiments: [String!]
  keywords: [String!]
  entities: [String!]
  minMisinformationScore: Float
  timeRange: TimeRangeInput
  geoWithin: GeoAreaInput
  searchText: String
  sortBy: String
  sortDirection: SortDirection
}

input CreateAlertInput {
  title: String!
  description: String
  severity: ThreatSeverity!
  domain: DomainType!
  sourceType: String!
  sourceId: UUID
  location: GeoPointInput
  affectedArea: GeoAreaInput
  tags: [String!]
  classification: ClassificationLevel!
  metadata: JSON
}

input UpdateAlertInput {
  status: AlertStatus
  severity: ThreatSeverity
  assignedTo: UUID
  resolutionNotes: String
  tags: [String!]
  metadata: JSON
}

input CreateSensorInput {
  name: String!
  sensorType: SensorType!
  domain: DomainType!
  location: GeoPointInput
  connectionUri: String
  connectionProtocol: String
  edgeNodeId: UUID
  classification: ClassificationLevel!
  metadata: JSON
}

input CreateMissionInput {
  name: String!
  description: String
  commanderId: UUID
  areaOfOperations: GeoAreaInput
  startTime: DateTime
  endTime: DateTime
  objectives: JSON
  rulesOfEngagement: String
  classification: ClassificationLevel!
}

input CreateTaskInput {
  missionId: UUID
  title: String!
  description: String
  priority: TaskPriority!
  assignedTo: UUID
  assignedUnit: String
  parentTaskId: UUID
  dueAt: DateTime
  location: GeoPointInput
  resourcesRequired: JSON
  classification: ClassificationLevel!
}

input CreateResponseRuleInput {
  name: String!
  description: String
  conditions: JSON!
  actions: JSON!
  actionType: ResponseActionType!
  severityThreshold: ThreatSeverity!
  requiresApproval: Boolean!
  approvalTimeoutMin: Int
  cooldownMinutes: Int
  maxExecutionsPerHour: Int
  priority: Int
  classification: ClassificationLevel!
}

input OllamaQueryInput {
  promptType: OllamaPromptType!
  prompt: String!
  systemPrompt: String
  contextEntityIds: [UUID!]
  contextAlertIds: [UUID!]
  contextDocumentIds: [String!]
  temperature: Float
  maxTokens: Int
  model: String
}

input WebhookRegistrationInput {
  name: String!
  url: String!
  events: [String!]!
  secret: String!
  headers: JSON
  retryPolicy: JSON
  isActive: Boolean
}

input GraphQueryInput {
  entityId: UUID
  entityType: String
  maxDepth: Int
  relationshipTypes: [String!]
  minConfidence: Float
  limit: Int
}

input SimulationInput {
  name: String!
  description: String
  scenarioType: String!
  scenarioConfig: JSON!
  areaOfInterest: GeoAreaInput
  timeAcceleration: Float
}

# ══════════════════════════════════════════════════════════════
# QUERIES
# ══════════════════════════════════════════════════════════════

type Query {
  # Auth
  me: User!
  user(id: UUID!): User
  users(pagination: PaginationInput, role: UserRole, orgId: UUID): UserConnection!

  # Organizations
  organization(id: UUID!): Organization
  organizations: [Organization!]!

  # Alerts
  alert(id: UUID!): Alert
  alerts(filter: AlertFilterInput, pagination: PaginationInput): AlertConnection!
  alertAggregations(filter: AlertFilterInput): AlertAggregation!

  # Detections
  detection(id: UUID!): Detection
  detections(filter: DetectionFilterInput, pagination: PaginationInput): DetectionConnection!

  # Tracks
  track(id: UUID!): Track
  tracks(filter: TrackFilterInput, pagination: PaginationInput): TrackConnection!
  activeTracks(geoWithin: GeoAreaInput): [Track!]!

  # Sensors
  sensor(id: UUID!): Sensor
  sensors(pagination: PaginationInput, types: [SensorType!], statuses: [SensorStatus!], domain: DomainType): SensorConnection!
  sensorsByArea(area: GeoAreaInput!): [Sensor!]!

  # Missions & Tasks
  mission(id: UUID!): Mission
  missions(status: MissionStatus, pagination: PaginationInput): [Mission!]!
  task(id: UUID!): Task
  tasks(missionId: UUID, status: TaskStatus, assignedTo: UUID): [Task!]!

  # Cyber
  cyberEvent(id: UUID!): CyberEvent
  cyberEvents(filter: CyberEventFilterInput, pagination: PaginationInput): CyberEventConnection!
  cyberDashboard(timeRange: TimeRangeInput): CyberDashboard!
  threatIndicator(id: UUID!): ThreatIndicator
  threatIndicators(indicatorType: String, isActive: Boolean, pagination: PaginationInput): [ThreatIndicator!]!

  # OSINT
  osintItem(id: String!): OsintItem
  osintItems(filter: OsintFilterInput, pagination: PaginationInput): OsintConnection!
  osintDashboard(timeRange: TimeRangeInput): OsintDashboard!

  # Intelligence Fusion
  intelEntity(id: UUID!): IntelEntity
  intelEntities(entityType: String, domain: DomainType, searchText: String, pagination: PaginationInput): [IntelEntity!]!
  graphQuery(input: GraphQueryInput!): [IntelEntity!]!
  graphAnalytics(entityIds: [UUID!]!, algorithms: [String!]): GraphAnalytics!
  shortestPath(sourceId: UUID!, targetId: UUID!, maxDepth: Int): [IntelEntity!]

  # Response
  responseRule(id: UUID!): ResponseRule
  responseRules(isActive: Boolean): [ResponseRule!]!
  pendingApprovals: [ApprovalRequest!]!

  # AI Models
  aiModel(id: UUID!): AIModel
  aiModels(status: ModelStatus): [AIModel!]!

  # Ollama
  ollamaModels: [OllamaModel!]!

  # Simulation
  simulation(id: UUID!): Simulation
  simulations(status: MissionStatus): [Simulation!]!

  # Governance
  auditLog(filter: JSON, pagination: PaginationInput): AuditLogConnection!
  dataClassification(resourceType: String!, resourceId: UUID!): DataClassification

  # Counter-Intelligence
  honeypots: [Honeypot!]!
  adversaryProfiles(pagination: PaginationInput): [AdversaryProfile!]!
  adversaryProfile(id: UUID!): AdversaryProfile

  # Dashboard Stats
  alertStats: AlertStats!
  sensorStats: SensorStats!
  cyberStats: CyberStats!
  responseStats: ResponseStats!
  fusionStats: FusionStats!
  correlations(limit: Int): [Correlation!]!
  osintFeeds: [OsintFeed!]!

  # System
  systemHealth: SystemHealth!
}

# ══════════════════════════════════════════════════════════════
# MUTATIONS
# ══════════════════════════════════════════════════════════════

type Mutation {
  # Auth
  login(username: String!, password: String!, orgShortCode: String!): AuthPayload!
  loginMfa(token: String!, mfaCode: String!): AuthPayload!
  refreshToken(refreshToken: String!): AuthPayload!
  logout: Boolean!
  setupMfa: MfaSetupPayload!
  enableMfa(code: String!): Boolean!
  disableMfa(code: String!): Boolean!

  # Users
  createUser(username: String!, email: String!, role: UserRole!, clearanceLevel: ClassificationLevel!, orgId: UUID!): User!
  updateUser(id: UUID!, role: UserRole, clearanceLevel: ClassificationLevel, isActive: Boolean): User!
  resetPassword(userId: UUID!): Boolean!
  changePassword(currentPassword: String!, newPassword: String!): Boolean!

  # Alerts
  createAlert(input: CreateAlertInput!): Alert!
  updateAlert(id: UUID!, input: UpdateAlertInput!): Alert!
  acknowledgeAlert(id: UUID!): Alert!
  resolveAlert(id: UUID!, notes: String!): Alert!
  escalateAlert(id: UUID!, to: UUID!, notes: String): Alert!
  bulkUpdateAlerts(ids: [UUID!]!, status: AlertStatus!): [Alert!]!

  # Sensors
  createSensor(input: CreateSensorInput!): Sensor!
  updateSensor(id: UUID!, input: JSON!): Sensor!
  deleteSensor(id: UUID!): Boolean!

  # Missions & Tasks
  createMission(input: CreateMissionInput!): Mission!
  updateMission(id: UUID!, input: JSON!): Mission!
  updateMissionStatus(id: UUID!, status: MissionStatus!): Mission!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: UUID!, input: JSON!): Task!
  updateTaskStatus(id: UUID!, status: TaskStatus!): Task!
  assignTask(id: UUID!, userId: UUID!): Task!

  # Response
  createResponseRule(input: CreateResponseRuleInput!): ResponseRule!
  updateResponseRule(id: UUID!, input: JSON!): ResponseRule!
  toggleResponseRule(id: UUID!, isActive: Boolean!): ResponseRule!
  approveExecution(executionId: UUID!, notes: String): ResponseExecution!
  rejectExecution(executionId: UUID!, notes: String!): ResponseExecution!
  rollbackExecution(executionId: UUID!): ResponseExecution!
  triggerManualResponse(alertId: UUID!, actionType: ResponseActionType!, parameters: JSON): ResponseExecution!

  # Intelligence Fusion
  createIntelEntity(entityType: String!, name: String!, domain: DomainType, attributes: JSON, classification: ClassificationLevel): IntelEntity!
  updateIntelEntity(id: UUID!, attributes: JSON, classification: ClassificationLevel): IntelEntity!
  linkEntities(sourceId: UUID!, targetId: UUID!, relationshipType: String!, confidence: Float!, attributes: JSON): IntelRelationship!
  mergeEntities(primaryId: UUID!, duplicateId: UUID!): IntelEntity!

  # Ollama
  queryOllama(input: OllamaQueryInput!): OllamaResponse!
  submitOllamaFeedback(interactionId: String!, rating: Int!, isAccurate: Boolean!, correction: String): Boolean!

  # Webhooks
  registerWebhook(input: WebhookRegistrationInput!): JSON!
  deleteWebhook(id: UUID!): Boolean!

  # Simulation
  createSimulation(input: SimulationInput!): Simulation!
  startSimulation(id: UUID!): Simulation!
  pauseSimulation(id: UUID!): Simulation!
  stopSimulation(id: UUID!): Simulation!

  # Governance
  classifyData(resourceType: String!, resourceId: UUID!, classification: ClassificationLevel!, caveats: [String!], releasableTo: [String!], reason: String): DataClassification!

  # AI Models
  deployModel(modelId: UUID!): AIModel!
  retireModel(modelId: UUID!): AIModel!
  rollbackModel(modelId: UUID!, targetVersion: String!): AIModel!
}

# ══════════════════════════════════════════════════════════════
# SUBSCRIPTIONS (Real-time via WebSocket)
# ══════════════════════════════════════════════════════════════

type Subscription {
  alertCreated(severities: [ThreatSeverity!], domains: [DomainType!]): Alert!
  alertUpdated(id: UUID): Alert!
  detectionCreated(sensorIds: [UUID!], domains: [DomainType!]): Detection!
  trackUpdated(trackIds: [UUID!]): Track!
  trackCreated(domains: [DomainType!]): Track!
  sensorStatusChanged(sensorIds: [UUID!]): Sensor!
  cyberEventCreated(severities: [ThreatSeverity!]): CyberEvent!
  osintItemCreated(sourceTypes: [OsintSourceType!]): OsintItem!
  approvalRequired(approverRole: UserRole): ApprovalRequest!
  responseExecuted: ResponseExecution!
  missionUpdated(missionId: UUID): Mission!
  systemHealthChanged: SystemHealth!
  simulationTick(simulationId: UUID!): JSON!
}

# ══════════════════════════════════════════════════════════════
# DIRECTIVES
# ══════════════════════════════════════════════════════════════

directive @auth(requires: UserRole!) on FIELD_DEFINITION | OBJECT
directive @classification(minLevel: ClassificationLevel!) on FIELD_DEFINITION | OBJECT
directive @rateLimit(max: Int!, window: Int!) on FIELD_DEFINITION
directive @cacheControl(maxAge: Int, scope: String) on FIELD_DEFINITION | OBJECT
directive @deprecated(reason: String) on FIELD_DEFINITION | ENUM_VALUE
