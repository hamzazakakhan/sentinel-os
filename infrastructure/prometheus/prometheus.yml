global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:4000']

  - job_name: 'ingestion-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ingestion-service:5000']
