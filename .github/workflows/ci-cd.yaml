name: Sentinel OS CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sentinel-os
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ui:
    name: Lint & Typecheck UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --legacy-peer-deps
        working-directory: ui
      - run: npx tsc --noEmit
        working-directory: ui

  lint-python:
    name: Lint Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/api-gateway/python
          - services/ai-service/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check --select E,F,I --ignore E501 ${{ matrix.service }}

  build-images:
    name: Build Docker Images
    needs: [lint-ui, lint-python]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway/python
          - service: ai-service
            context: services/ai-service/python
          - service: ingestion-service
            context: services/ingestion-service/go
          - service: ui
            context: ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    needs: [lint-ui, lint-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: 'CRITICAL,HIGH'
          exit-code: 0
