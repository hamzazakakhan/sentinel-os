name: Sentinel OS CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sentinel-os
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  RUST_VERSION: '1.77'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────
  lint-python:
    name: Lint Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - run: pip install ruff
      - run: ruff check services/ --ignore E501,W503,E712
      - run: ruff check ai-workers/ --ignore E501,W503
      - run: ruff check services/live-integrations/ --ignore E501,W503

  lint-ui:
    name: Lint & Typecheck UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install --legacy-peer-deps
        working-directory: ui
      - run: npx tsc --noEmit
        working-directory: ui

  lint-shell:
    name: Lint & Typecheck Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install --legacy-peer-deps
        working-directory: shell
      - run: npx tsc --noEmit
        working-directory: shell

  lint-shell-rust:
    name: Lint Shell Rust Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: 'clippy,rustfmt' }
      - run: cargo fmt --check
        working-directory: shell/src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: shell/src-tauri

  # ── Integration Tests ─────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-python, lint-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }
      - run: pip install pytest aiohttp structlog feedparser
      - run: python -m pytest tests/test_integration.py -v --tb=short

  # ── Build Docker Images ───────────────────────────────────
  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: [lint-python]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/api-gateway/python
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: [lint-ui]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ui
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ui:${{ github.sha }}

  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail build on vulns

  # ── ISO Build (on release) ────────────────────────────────
  build-iso:
    name: Build ISO (Release Only)
    runs-on: ubuntu-latest
    needs: [integration-tests, security-scan]
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools xorriso isolinux grub-efi-amd64-bin grub-pc-bin mtools
      - name: Build ISO
        run: sudo ./build/build-iso.sh
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-os-iso
          path: sentinel-os-2.0.iso
          retention-days: 30
