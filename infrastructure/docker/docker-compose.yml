version: "3.9"

x-common-env: &common-env
  NODE_ENV: production
  KAFKA_BROKERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
  REDIS_URL: redis://redis-cluster:6379
  PG_HOST: postgres-primary
  PG_PORT: "5432"
  PG_DATABASE: sentinel
  MONGO_URI: mongodb://mongo-1:27017,mongo-2:27017,mongo-3:27017/sentinel?replicaSet=rs0
  NEO4J_URI: bolt://neo4j:7687
  OLLAMA_BASE_URL: http://ollama:11434
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  LOG_LEVEL: info
  TZ: UTC

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - sentinel-internal
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
      tag: "{{.Name}}"

services:
  # ── ZooKeeper Ensemble ──
  zookeeper-1:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper-1
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zk-1-data:/var/lib/zookeeper/data
      - zk-1-log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  zookeeper-2:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper-2
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zk-2-data:/var/lib/zookeeper/data
      - zk-2-log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  zookeeper-3:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper-3
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zk-3-data:/var/lib/zookeeper/data
      - zk-3-log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Kafka Cluster (3-node) ──
  kafka-1:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-1
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka-1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  kafka-2:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-2
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka-2
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  kafka-3:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka-3
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka-3
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  kafka-schema-registry:
    <<: *service-defaults
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: kafka-schema-registry
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    environment:
      SCHEMA_REGISTRY_HOST_NAME: kafka-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── PostgreSQL Primary + Replica ──
  postgres-primary:
    <<: *service-defaults
    image: postgis/postgis:16-3.4
    hostname: postgres-primary
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=10
        -c max_replication_slots=10
        -c hot_standby=on
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c maintenance_work_mem=512MB
        -c work_mem=64MB
        -c max_connections=500
        -c ssl=on
        -c ssl_cert_file=/etc/postgresql/server.crt
        -c ssl_key_file=/etc/postgresql/server.key
        -c log_statement=ddl
        -c log_min_duration_statement=1000
        -c shared_preload_libraries='pg_stat_statements,pgaudit'
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./certs/pg:/etc/postgresql:ro
    secrets:
      - pg_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_admin -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  postgres-replica:
    <<: *service-defaults
    image: postgis/postgis:16-3.4
    hostname: postgres-replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      PGUSER: replicator
      PGPASSWORD_FILE: /run/secrets/pg_replication_password
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
      - ./certs/pg:/etc/postgresql:ro
    secrets:
      - pg_replication_password
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # ── MongoDB Replica Set ──
  mongo-1:
    <<: *service-defaults
    image: mongo:7.0
    hostname: mongo-1
    command: >
      mongod
        --replSet rs0
        --bind_ip_all
        --keyFile /etc/mongo/replica.key
        --tlsMode requireTLS
        --tlsCertificateKeyFile /etc/mongo/server.pem
        --tlsCAFile /etc/mongo/ca.pem
        --wiredTigerCacheSizeGB 2
        --setParameter authenticationMechanisms=SCRAM-SHA-256
    volumes:
      - mongo-1-data:/data/db
      - ./certs/mongo:/etc/mongo:ro
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.5"

  mongo-2:
    <<: *service-defaults
    image: mongo:7.0
    hostname: mongo-2
    command: >
      mongod
        --replSet rs0
        --bind_ip_all
        --keyFile /etc/mongo/replica.key
        --tlsMode requireTLS
        --tlsCertificateKeyFile /etc/mongo/server.pem
        --tlsCAFile /etc/mongo/ca.pem
        --wiredTigerCacheSizeGB 2
        --setParameter authenticationMechanisms=SCRAM-SHA-256
    volumes:
      - mongo-2-data:/data/db
      - ./certs/mongo:/etc/mongo:ro
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.5"

  mongo-3:
    <<: *service-defaults
    image: mongo:7.0
    hostname: mongo-3
    command: >
      mongod
        --replSet rs0
        --bind_ip_all
        --keyFile /etc/mongo/replica.key
        --tlsMode requireTLS
        --tlsCertificateKeyFile /etc/mongo/server.pem
        --tlsCAFile /etc/mongo/ca.pem
        --wiredTigerCacheSizeGB 2
        --setParameter authenticationMechanisms=SCRAM-SHA-256
    volumes:
      - mongo-3-data:/data/db
      - ./certs/mongo:/etc/mongo:ro
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "1.5"

  # ── Neo4j ──
  neo4j:
    <<: *service-defaults
    image: neo4j:5.17-enterprise
    hostname: neo4j
    environment:
      NEO4J_AUTH_FILE: /run/secrets/neo4j_password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 2G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_bolt_tls__level: REQUIRED
      NEO4J_dbms_ssl_policy_bolt_enabled: "true"
      NEO4J_dbms_ssl_policy_bolt_base__directory: /ssl/bolt
      NEO4J_dbms_ssl_policy_bolt_private__key: private.key
      NEO4J_dbms_ssl_policy_bolt_public__certificate: public.crt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./certs/neo4j:/ssl:ro
    secrets:
      - neo4j_password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "file:///run/secrets/neo4j_password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2.0"

  # ── Redis Cluster ──
  redis-cluster:
    <<: *service-defaults
    image: redis:7.2-alpine
    hostname: redis-cluster
    command: >
      redis-server
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --requirepass "${REDIS_PASSWORD}"
        --tls-port 6379
        --port 0
        --tls-cert-file /tls/redis.crt
        --tls-key-file /tls/redis.key
        --tls-ca-cert-file /tls/ca.crt
        --tls-auth-clients optional
    volumes:
      - redis-data:/data
      - ./certs/redis:/tls:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/tls/redis.crt", "--key", "/tls/redis.key", "--cacert", "/tls/ca.crt", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ── Ollama (Local LLM) ──
  ollama:
    <<: *service-defaults
    image: ollama/ollama:latest
    hostname: ollama
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Sentinel Services ──
  api-gateway:
    <<: *service-defaults
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    hostname: api-gateway
    environment:
      <<: *common-env
      PORT: "4000"
      AUTH_SERVICE_URL: http://auth-service:4001
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "1000"
      CORS_ORIGINS: "https://sentinel.internal"
      GRAPHQL_DEPTH_LIMIT: "10"
      GRAPHQL_COMPLEXITY_LIMIT: "2000"
    ports:
      - "4000:4000"
    secrets:
      - jwt_public_key
    depends_on:
      - kafka-1
      - redis-cluster
      - postgres-primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      replicas: 3

  auth-service:
    <<: *service-defaults
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    hostname: auth-service
    environment:
      <<: *common-env
      PORT: "4001"
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      JWT_ACCESS_TOKEN_TTL: "900"
      JWT_REFRESH_TOKEN_TTL: "604800"
      MFA_ISSUER: "SentinelOS"
      SAML_ENTRY_POINT: "${SAML_ENTRY_POINT}"
      SAML_CERT_FILE: /run/secrets/saml_cert
      OAUTH2_CLIENT_ID: "${OAUTH2_CLIENT_ID}"
      OAUTH2_CLIENT_SECRET_FILE: /run/secrets/oauth2_secret
      BCRYPT_ROUNDS: "12"
      ACCOUNT_LOCKOUT_THRESHOLD: "5"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "30"
    secrets:
      - jwt_private_key
      - jwt_public_key
      - saml_cert
      - oauth2_secret
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-cluster:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      replicas: 2

  ingestion-service:
    <<: *service-defaults
    build:
      context: ../../services/ingestion-service
      dockerfile: Dockerfile
    hostname: ingestion-service
    environment:
      <<: *common-env
      PORT: "4002"
      RTSP_FRAME_RATE: "15"
      MQTT_BROKER_URL: mqtt://mqtt-broker:1883
      WEBHOOK_HMAC_SECRET_FILE: /run/secrets/webhook_hmac_secret
      MAX_PAYLOAD_SIZE_MB: "50"
      EDGE_INFERENCE_ENABLED: "true"
      BUFFER_FLUSH_INTERVAL_MS: "5000"
      BUFFER_MAX_SIZE: "1000"
    secrets:
      - webhook_hmac_secret
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - redis-cluster
      - mqtt-broker
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
      replicas: 3

  ai-service:
    <<: *service-defaults
    build:
      context: ../../services/ai-service
      dockerfile: Dockerfile
    hostname: ai-service
    environment:
      <<: *common-env
      PORT: "4003"
      YOLOV8_MODEL_PATH: /models/yolov8x.pt
      YOLOV8_CONFIDENCE_THRESHOLD: "0.45"
      YOLOV8_IOU_THRESHOLD: "0.5"
      ISOLATION_FOREST_CONTAMINATION: "0.05"
      LSTM_SEQUENCE_LENGTH: "60"
      LSTM_PREDICTION_HORIZON: "24"
      OLLAMA_MODEL: "llama3:70b"
      OLLAMA_CONTEXT_LENGTH: "8192"
      MODEL_REGISTRY_PATH: /models/registry
      DRIFT_DETECTION_ENABLED: "true"
      DRIFT_THRESHOLD: "0.15"
      INFERENCE_BATCH_SIZE: "32"
      GPU_MEMORY_FRACTION: "0.8"
    volumes:
      - ai-models:/models
    depends_on:
      - kafka-1
      - redis-cluster
      - ollama
      - postgres-primary
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
      replicas: 2

  osint-service:
    <<: *service-defaults
    build:
      context: ../../services/osint-service
      dockerfile: Dockerfile
    hostname: osint-service
    environment:
      <<: *common-env
      PORT: "4004"
      TWITTER_BEARER_TOKEN_FILE: /run/secrets/twitter_token
      NEWS_API_KEY_FILE: /run/secrets/news_api_key
      SOCIAL_COLLECTION_INTERVAL_MS: "30000"
      NEWS_COLLECTION_INTERVAL_MS: "60000"
      NLP_SPACY_MODEL: "en_core_web_trf"
      SENTIMENT_MODEL: "cardiffnlp/twitter-roberta-base-sentiment-latest"
      THREAT_KEYWORDS_PATH: /config/threat-keywords.json
      OLLAMA_MODEL: "llama3:70b"
      MAX_CONCURRENT_COLLECTORS: "10"
      DEDUPLICATION_WINDOW_HOURS: "24"
    volumes:
      - osint-config:/config:ro
    secrets:
      - twitter_token
      - news_api_key
    depends_on:
      - kafka-1
      - mongo-1
      - redis-cluster
      - ollama
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
      replicas: 2

  fusion-service:
    <<: *service-defaults
    build:
      context: ../../services/fusion-service
      dockerfile: Dockerfile
    hostname: fusion-service
    environment:
      <<: *common-env
      PORT: "4005"
      CORRELATION_WINDOW_MINUTES: "30"
      MIN_CORRELATION_SCORE: "0.65"
      GRAPH_UPDATE_BATCH_SIZE: "100"
      TEMPORAL_DECAY_FACTOR: "0.95"
      SPATIAL_CORRELATION_RADIUS_KM: "5.0"
      ENTITY_RESOLUTION_THRESHOLD: "0.80"
      CROSS_DOMAIN_LINK_MIN_CONFIDENCE: "0.70"
    depends_on:
      - kafka-1
      - neo4j
      - postgres-primary
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
      replicas: 2

  cyber-service:
    <<: *service-defaults
    build:
      context: ../../services/cyber-service
      dockerfile: Dockerfile
    hostname: cyber-service
    environment:
      <<: *common-env
      PORT: "4006"
      SURICATA_SOCKET: /var/run/suricata/suricata-command.socket
      SURICATA_LOG_DIR: /var/log/suricata
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      STIX_TAXII_SERVER: "${STIX_TAXII_SERVER}"
      MISP_API_URL: "${MISP_API_URL}"
      MISP_API_KEY_FILE: /run/secrets/misp_api_key
      THREAT_FEED_UPDATE_INTERVAL_MS: "300000"
      IOC_MATCH_CACHE_TTL_SECONDS: "3600"
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - suricata-socket:/var/run/suricata:ro
    secrets:
      - misp_api_key
    depends_on:
      - kafka-1
      - elasticsearch
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
      replicas: 2

  response-service:
    <<: *service-defaults
    build:
      context: ../../services/response-service
      dockerfile: Dockerfile
    hostname: response-service
    environment:
      <<: *common-env
      PORT: "4007"
      RULE_ENGINE_EVALUATION_INTERVAL_MS: "5000"
      AUTO_RESPONSE_ENABLED: "false"
      ESCALATION_DEFAULT_TIMEOUT_MINUTES: "15"
      NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL}"
      HUMAN_APPROVAL_REQUIRED_ABOVE_SEVERITY: "7"
      MAX_AUTO_ACTIONS_PER_MINUTE: "10"
    depends_on:
      - kafka-1
      - postgres-primary
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      replicas: 2

  simulation-service:
    <<: *service-defaults
    build:
      context: ../../services/simulation-service
      dockerfile: Dockerfile
    hostname: simulation-service
    environment:
      <<: *common-env
      PORT: "4008"
      DIGITAL_TWIN_UPDATE_INTERVAL_MS: "1000"
      SCENARIO_MAX_DURATION_HOURS: "24"
      SIMULATION_TIME_ACCELERATION: "10"
    depends_on:
      - kafka-1
      - postgres-primary
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  governance-service:
    <<: *service-defaults
    build:
      context: ../../services/governance-service
      dockerfile: Dockerfile
    hostname: governance-service
    environment:
      <<: *common-env
      PORT: "4009"
      WORM_STORAGE_PATH: /worm-storage
      CLASSIFICATION_LEVELS: "UNCLASSIFIED,CONFIDENTIAL,SECRET,TOP_SECRET"
      RETENTION_DEFAULT_DAYS: "2555"
      AUDIT_LOG_ENCRYPTION_KEY_FILE: /run/secrets/audit_encryption_key
    volumes:
      - worm-storage:/worm-storage
    secrets:
      - audit_encryption_key
    depends_on:
      - kafka-1
      - postgres-primary
      - mongo-1
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ── C4ISR Tactical Services ──
  tak-service:
    <<: *service-defaults
    build:
      context: ../../services/tak-service
      dockerfile: Dockerfile
    hostname: tak-service
    environment:
      <<: *common-env
      PORT: "8090"
      COT_UDP_PORT: "4242"
      COT_TCP_PORT: "8087"
      COT_MCAST_GROUP: "239.2.3.1"
    ports:
      - "8090:8090"
      - "4242:4242/udp"
      - "8087:8087"
    depends_on:
      - kafka-1
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  threat-intel-service:
    <<: *service-defaults
    build:
      context: ../../services/threat-intel-service
      dockerfile: Dockerfile
    hostname: threat-intel-service
    environment:
      <<: *common-env
      PORT: "8091"
      DATABASE_URL: postgres://sentinel:sentinel@postgres-primary:5432/sentinel
    depends_on:
      - kafka-1
      - postgres-primary
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  mission-planning-service:
    <<: *service-defaults
    build:
      context: ../../services/mission-planning-service
      dockerfile: Dockerfile
    hostname: mission-planning-service
    environment:
      <<: *common-env
      PORT: "8092"
      DATABASE_URL: postgres://sentinel:sentinel@postgres-primary:5432/sentinel
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: tinyllama
    depends_on:
      - kafka-1
      - postgres-primary
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  space-awareness-service:
    <<: *service-defaults
    build:
      context: ../../services/space-awareness-service
      dockerfile: Dockerfile
    hostname: space-awareness-service
    environment:
      <<: *common-env
      PORT: "8093"
      CONJUNCTION_KM: "10"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  counter-uas-service:
    <<: *service-defaults
    build:
      context: ../../services/counter-uas-service
      dockerfile: Dockerfile
    hostname: counter-uas-service
    environment:
      <<: *common-env
      PORT: "8094"
    depends_on:
      - kafka-1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Supporting Infrastructure ──
  mqtt-broker:
    <<: *service-defaults
    image: eclipse-mosquitto:2.0
    hostname: mqtt-broker
    volumes:
      - ./configs/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./certs/mqtt:/mosquitto/certs:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
    ports:
      - "1883:1883"
      - "8883:8883"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  elasticsearch:
    <<: *service-defaults
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/es.key
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/es.crt
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - ELASTIC_PASSWORD_FILE=/run/secrets/elastic_password
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./certs/elasticsearch:/usr/share/elasticsearch/config/certs:ro
    secrets:
      - elastic_password
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  kibana:
    <<: *service-defaults
    image: docker.elastic.co/kibana/kibana:8.12.0
    hostname: kibana
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=/usr/share/kibana/config/certs/ca.crt
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=/usr/share/kibana/config/certs/kibana.crt
      - SERVER_SSL_KEY=/usr/share/kibana/config/certs/kibana.key
    volumes:
      - ./certs/kibana:/usr/share/kibana/config/certs:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  suricata:
    <<: *service-defaults
    image: jasonish/suricata:7.0
    hostname: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    volumes:
      - ./configs/suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./configs/suricata/rules:/etc/suricata/rules:ro
      - suricata-logs:/var/log/suricata
      - suricata-socket:/var/run/suricata
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Observability ──
  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:0.94.0
    hostname: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./configs/otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.49.0
    hostname: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  grafana:
    <<: *service-defaults
    image: grafana/grafana:10.3.0
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/certs/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/certs/grafana.key
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./certs/grafana:/etc/grafana/certs:ro
    secrets:
      - grafana_password
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  jaeger:
    <<: *service-defaults
    image: jaegertracing/all-in-one:1.54
    hostname: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=https://elasticsearch:9200
      - ES_TLS_CA=/certs/ca.crt
    volumes:
      - ./certs/elasticsearch:/certs:ro
    ports:
      - "16686:16686"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ── Command UI ──
  sentinel-ui:
    <<: *service-defaults
    build:
      context: ../../ui
      dockerfile: Dockerfile
    hostname: sentinel-ui
    environment:
      - VITE_API_GATEWAY_URL=https://api-gateway:4000
      - VITE_WS_URL=wss://api-gateway:4000/ws
      - VITE_MAP_TILE_URL=${MAP_TILE_URL}
    ports:
      - "443:443"
    depends_on:
      - api-gateway
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      replicas: 2

networks:
  sentinel-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      encrypted: "true"

volumes:
  zk-1-data:
  zk-1-log:
  zk-2-data:
  zk-2-log:
  zk-3-data:
  zk-3-log:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  pg-primary-data:
  pg-replica-data:
  mongo-1-data:
  mongo-2-data:
  mongo-3-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  ollama-models:
  ai-models:
  es-data:
  suricata-logs:
  suricata-socket:
  mqtt-data:
  mqtt-log:
  prometheus-data:
  grafana-data:
  worm-storage:
  osint-config:

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  pg_replication_password:
    file: ./secrets/pg_replication_password.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  jwt_private_key:
    file: ./secrets/jwt_private_key.pem
  jwt_public_key:
    file: ./secrets/jwt_public_key.pem
  webhook_hmac_secret:
    file: ./secrets/webhook_hmac_secret.txt
  twitter_token:
    file: ./secrets/twitter_token.txt
  news_api_key:
    file: ./secrets/news_api_key.txt
  misp_api_key:
    file: ./secrets/misp_api_key.txt
  elastic_password:
    file: ./secrets/elastic_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  saml_cert:
    file: ./secrets/saml_cert.pem
  oauth2_secret:
    file: ./secrets/oauth2_secret.txt
  audit_encryption_key:
    file: ./secrets/audit_encryption_key.txt
