apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-os
  labels:
    app.kubernetes.io/part-of: sentinel-os
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-monitoring
  labels:
    app.kubernetes.io/part-of: sentinel-os
---
apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-data
  labels:
    app.kubernetes.io/part-of: sentinel-os
    istio-injection: enabled
