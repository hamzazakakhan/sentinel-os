# sentinel-os/infrastructure/kubernetes/overlays/dev/replicas-patch.yaml
apiVersion: apps/v1
kind: Deployment
metadata: { name: sentinel-gateway }
spec: { replicas: 1 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: sentinel-gateway-hpa }
spec:
  minReplicas: 1
  maxReplicas: 3
